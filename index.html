<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Orblion</title>
    <style>
      :root {
        --mx: 50%;
        --my: 45%;
        --mx-num: 0.5;
        --my-num: 0.5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        background:
          radial-gradient(circle at var(--mx) var(--my), rgba(140, 54, 255, 0.3), transparent 22rem),
          radial-gradient(circle at 18% 22%, rgba(91, 33, 182, 0.26), transparent 24rem),
          radial-gradient(circle at 82% 76%, rgba(76, 29, 149, 0.2), transparent 22rem),
          linear-gradient(135deg, #07030d 0%, #12051f 46%, #030106 100%);
      }

      body::before,
      body::after {
        position: fixed;
        inset: 0;
        pointer-events: none;
        content: "";
      }

      body::before {
        opacity: 0.28;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
        background-size: 52px 52px;
        mask-image: radial-gradient(circle at center, black 0 44%, transparent 72%);
        animation: grid-drift 18s linear infinite;
      }

      body::after {
        background:
          linear-gradient(rgba(255, 255, 255, 0.04) 50%, transparent 50%),
          radial-gradient(circle at center, transparent 0 50%, rgba(0, 0, 0, 0.52) 100%);
        background-size: 100% 4px, 100% 100%;
        mix-blend-mode: overlay;
      }

      main {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px 28px 22px;
      }

      .snow {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
      }

      .flake {
        position: absolute;
        top: -12vh;
        left: var(--x);
        width: var(--size);
        height: var(--size);
        border-radius: 50%;
        background: rgba(255, 255, 255, var(--alpha));
        box-shadow: 0 0 calc(var(--size) * 4) rgba(255, 255, 255, 0.58);
        filter: blur(var(--blur));
        animation: snowfall var(--duration) linear var(--delay) infinite;
      }

      .stage {
        position: relative;
        width: min(1320px, 100%);
        min-height: min(860px, calc(100vh - 50px));
        display: grid;
        grid-template-rows: auto auto;
        place-items: center;
        align-content: center;
        gap: clamp(16px, 3vh, 34px);
        isolation: isolate;
      }

      .halo {
        position: absolute;
        width: min(78vw, 760px);
        aspect-ratio: 1;
        border-radius: 50%;
        background:
          conic-gradient(from 130deg, transparent, rgba(168, 85, 247, 0.48), rgba(88, 28, 135, 0.42), transparent 62%);
        filter: blur(30px);
        opacity: 0.72;
        animation: spin 18s linear infinite;
      }

      .ring {
        position: absolute;
        width: min(72vw, 620px);
        aspect-ratio: 1;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 50%;
        box-shadow:
          0 0 42px rgba(168, 85, 247, 0.24),
          inset 0 0 38px rgba(91, 33, 182, 0.2);
        animation: pulse 4.5s ease-in-out infinite;
      }

      .ring::before,
      .ring::after {
        position: absolute;
        inset: 8%;
        border: 1px dashed rgba(255, 255, 255, 0.18);
        border-radius: inherit;
        content: "";
      }

      .ring::after {
        inset: 20%;
        border-style: solid;
        border-color: rgba(192, 132, 252, 0.18);
      }

      .logo {
        position: relative;
        z-index: 2;
        display: block;
        width: min(72vw, 900px);
        max-width: 100%;
        height: auto;
        background: transparent;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        animation: hover 5s ease-in-out infinite;
        transform: perspective(900px) rotateX(calc((var(--my-num) - 0.5) * -5deg)) rotateY(calc((var(--mx-num) - 0.5) * 7deg));
        transition: transform 180ms ease-out;
      }

      .players {
        position: relative;
        z-index: 2;
        width: min(100%, 1240px);
        display: grid;
        grid-template-columns: repeat(4, 300px);
        justify-content: center;
        justify-items: center;
        gap: clamp(10px, 2vw, 20px);
      }

      .team {
        position: relative;
        z-index: 2;
        display: grid;
        justify-items: center;
        gap: 18px;
        width: min(100%, 1240px);
      }

      .team-title {
        margin: 0;
        padding: 8px 16px;
        border: 1px solid rgba(192, 132, 252, 0.22);
        border-radius: 999px;
        background: rgba(12, 4, 22, 0.46);
        color: rgba(255, 255, 255, 0.9);
        font: 800 clamp(0.82rem, 1.4vw, 1rem)/1 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.24);
        backdrop-filter: blur(12px);
      }

      .player {
        display: grid;
        grid-template-rows: 1fr auto;
        place-items: end center;
        gap: 10px;
        width: 300px;
        height: 400px;
        background: transparent;
      }

      .player img {
        display: block;
        width: auto;
        height: min(100%, 380px);
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        filter: drop-shadow(0 24px 34px rgba(0, 0, 0, 0.46));
      }

      .name {
        min-height: 32px;
        padding: 6px 12px;
        border: 1px solid rgba(192, 132, 252, 0.22);
        border-radius: 999px;
        background: rgba(12, 4, 22, 0.5);
        color: rgba(255, 255, 255, 0.88);
        font: 700 0.9rem/1.2 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
        text-shadow: 0 0 14px rgba(168, 85, 247, 0.42);
        backdrop-filter: blur(10px);
      }

      @keyframes hover {
        0%, 100% {
          translate: 0 0;
        }

        50% {
          translate: 0 -10px;
        }
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes pulse {
        0%, 100% {
          transform: scale(0.98);
          opacity: 0.56;
        }

        50% {
          transform: scale(1.04);
          opacity: 0.92;
        }
      }

      @keyframes grid-drift {
        to {
          background-position: 52px 52px;
        }
      }

      @keyframes snowfall {
        from {
          transform: translate3d(0, 0, 0);
        }

        to {
          transform: translate3d(var(--drift), 116vh, 0);
        }
      }

      @media (max-width: 680px) {
        body {
          overflow: auto;
        }

        main {
          padding: 18px;
        }

        .stage {
          min-height: calc(100vh - 36px);
          gap: 18px;
        }

        .logo {
          width: min(92vw, 780px);
        }

        .team {
          gap: 14px;
        }

        .team-title {
          font-size: 0.72rem;
        }

        .players {
          grid-template-columns: repeat(2, 150px);
        }

        .player {
          width: 150px;
          height: 230px;
        }

        .player img {
          height: min(100%, 190px);
        }

        .name {
          min-height: 28px;
          padding: 5px 10px;
          font-size: 0.78rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="snow" aria-hidden="true"></div>

    <main>
      <section class="stage">
        <div class="halo"></div>
        <div class="ring"></div>
        <img class="logo" src="png/logo.png" alt="Orblion">
        <section class="team" aria-label="Administratoren">
          <h1 class="team-title">Administratoren</h1>
          <div class="players"></div>
        </section>
      </section>
    </main>

    <script>
      const root = document.documentElement;
      const snow = document.querySelector(".snow");
      const players = document.querySelector(".players");
      const flakeCount = 90;
      const playerList = [
        { uuid: "4554de35-091a-44ee-b6f5-fa718155e2b4", name: "Blulife" },
        { uuid: "7c4b9eb7-0c0d-4149-90c5-b6d63b86db8e", name: "ItsBromil" },
        { uuid: "a09a2541-2438-4cb9-83b1-d64804e44fda", name: "Nice_Fazo" },
        { uuid: "e2e5c9b4-a79f-4f20-8a75-ecc71cf54cd9", name: "FenceeeGateee" }
      ];

      function rawUuid(uuid) {
        return uuid.replaceAll("-", "");
      }

      function createPlayer(playerData) {
        const player = document.createElement("div");
        const image = document.createElement("img");
        const name = document.createElement("span");
        const uuid = playerData.uuid;

        player.className = "player";
        image.src = `https://avatars.oc.tc/renders/body/${uuid}?scale=10&overlay`;
        image.alt = "";
        name.className = "name";
        name.textContent = playerData.name;

        player.append(image, name);
        players.appendChild(player);

        fetch(`https://playerdb.co/api/player/minecraft/${uuid}`)
          .then((response) => {
            if (!response.ok) {
              throw new Error(`Name lookup failed: ${response.status}`);
            }

            return response.json();
          })
          .then((result) => {
            name.textContent = result.data?.player?.username || playerData.name;
          })
          .catch(() => {
            name.textContent = playerData.name;
          });
      }

      playerList.forEach(createPlayer);

      for (let index = 0; index < flakeCount; index += 1) {
        const flake = document.createElement("span");
        const size = Math.random() * 4 + 1;

        flake.className = "flake";
        flake.style.setProperty("--x", `${Math.random() * 100}%`);
        flake.style.setProperty("--size", `${size}px`);
        flake.style.setProperty("--alpha", `${Math.random() * 0.58 + 0.18}`);
        flake.style.setProperty("--blur", `${Math.random() * 1.6}px`);
        flake.style.setProperty("--drift", `${(Math.random() - 0.5) * 180}px`);
        flake.style.setProperty("--duration", `${Math.random() * 12 + 10}s`);
        flake.style.setProperty("--delay", `${Math.random() * -24}s`);

        snow.appendChild(flake);
      }

      window.addEventListener("pointermove", (event) => {
        const x = event.clientX / window.innerWidth;
        const y = event.clientY / window.innerHeight;

        root.style.setProperty("--mx", `${x * 100}%`);
        root.style.setProperty("--my", `${y * 100}%`);
        root.style.setProperty("--mx-num", x.toFixed(3));
        root.style.setProperty("--my-num", y.toFixed(3));
      });
    </script>
  </body>
</html>
