<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Orblion</title>
    <style>
      :root {
        color-scheme: dark;
        --mx: 50%;
        --my: 45%;
        --mx-num: 0.5;
        --my-num: 0.5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        background:
          radial-gradient(circle at var(--mx) var(--my), rgba(255, 61, 242, 0.34), transparent 20rem),
          radial-gradient(circle at 12% 18%, rgba(38, 246, 255, 0.2), transparent 22rem),
          radial-gradient(circle at 80% 78%, rgba(188, 255, 79, 0.13), transparent 18rem),
          linear-gradient(135deg, #08040f 0%, #0d0718 42%, #030305 100%);
      }

      body::before,
      body::after {
        position: fixed;
        inset: 0;
        pointer-events: none;
        content: "";
      }

      body::before {
        opacity: 0.28;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
        background-size: 52px 52px;
        mask-image: radial-gradient(circle at center, black 0 44%, transparent 72%);
        animation: grid-drift 18s linear infinite;
      }

      body::after {
        background:
          linear-gradient(rgba(255, 255, 255, 0.04) 50%, transparent 50%),
          radial-gradient(circle at center, transparent 0 50%, rgba(0, 0, 0, 0.52) 100%);
        background-size: 100% 4px, 100% 100%;
        mix-blend-mode: overlay;
      }

      main {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px;
      }

      .stage {
        position: relative;
        width: min(1180px, 100%);
        min-height: min(720px, calc(100vh - 56px));
        display: grid;
        place-items: center;
        isolation: isolate;
      }

      .halo {
        position: absolute;
        width: min(78vw, 760px);
        aspect-ratio: 1;
        border-radius: 50%;
        background:
          conic-gradient(from 130deg, transparent, rgba(255, 61, 242, 0.52), rgba(38, 246, 255, 0.5), transparent 62%);
        filter: blur(30px);
        opacity: 0.72;
        animation: spin 18s linear infinite;
      }

      .ring {
        position: absolute;
        width: min(72vw, 620px);
        aspect-ratio: 1;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 50%;
        box-shadow:
          0 0 42px rgba(255, 61, 242, 0.22),
          inset 0 0 38px rgba(38, 246, 255, 0.12);
        animation: pulse 4.5s ease-in-out infinite;
      }

      .ring::before,
      .ring::after {
        position: absolute;
        inset: 8%;
        border: 1px dashed rgba(255, 255, 255, 0.18);
        border-radius: inherit;
        content: "";
      }

      .ring::after {
        inset: 20%;
        border-style: solid;
        border-color: rgba(188, 255, 79, 0.18);
      }

      img {
        position: relative;
        z-index: 2;
        display: block;
        max-width: min(92vw, 1200px);
        height: auto;
        background: transparent;
        filter:
          drop-shadow(0 18px 18px rgba(0, 0, 0, 0.7))
          drop-shadow(0 0 28px rgba(255, 61, 242, 0.64))
          drop-shadow(0 0 42px rgba(38, 246, 255, 0.18));
        animation: hover 5s ease-in-out infinite;
        transform: perspective(900px) rotateX(calc((var(--my-num) - 0.5) * -5deg)) rotateY(calc((var(--mx-num) - 0.5) * 7deg));
        transition: transform 180ms ease-out;
      }

      @keyframes hover {
        0%, 100% {
          translate: 0 0;
        }

        50% {
          translate: 0 -10px;
        }
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes pulse {
        0%, 100% {
          transform: scale(0.98);
          opacity: 0.56;
        }

        50% {
          transform: scale(1.04);
          opacity: 0.92;
        }
      }

      @keyframes grid-drift {
        to {
          background-position: 52px 52px;
        }
      }

      @media (max-width: 680px) {
        body {
          overflow: auto;
        }

        main {
          padding: 18px;
        }

        .stage {
          min-height: calc(100vh - 36px);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="stage">
        <div class="halo"></div>
        <div class="ring"></div>
        <img src="png/tablist-banner.png" alt="Orblion">
      </section>
    </main>

    <script>
      const root = document.documentElement;

      window.addEventListener("pointermove", (event) => {
        const x = event.clientX / window.innerWidth;
        const y = event.clientY / window.innerHeight;

        root.style.setProperty("--mx", `${x * 100}%`);
        root.style.setProperty("--my", `${y * 100}%`);
        root.style.setProperty("--mx-num", x.toFixed(3));
        root.style.setProperty("--my-num", y.toFixed(3));
      });
    </script>
  </body>
</html>
